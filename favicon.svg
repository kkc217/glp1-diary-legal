<!--
  앱 런처 아이콘과 같은 처리(흰 카드 + 슬레이트 로고)라 탭에서 앱과 같은 것으로 읽힌다.

  로고는 viewBox 중앙에 있지 않다. 실제 내용은 x 19.5~90.5, y 32.5~68.5라 중심이 (55, 50.5)다.
  그대로 얹으면 오른쪽 아래로 치우치므로 그 중심을 잡아 캔버스 한가운데로 옮긴다.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <rect width="100" height="100" rx="22" fill="#fff"/>
  <g transform="translate(50 50) scale(0.7) translate(-55 -50.5)">
    <circle cx="24" cy="62" r="4.5" fill="#5F7189" fill-opacity=".4"/>
    <circle cx="42" cy="62" r="5.5" fill="#5F7189" fill-opacity=".62"/>
    <circle cx="60" cy="62" r="6.5" fill="#5F7189" fill-opacity=".85"/>
    <circle cx="80" cy="43" r="10.5" fill="#5F7189"/>
  </g>
</svg>
